<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Medical cross / plus symbol -->
  <!-- Vertical bar -->
  <rect x="26" y="12" width="12" height="40" rx="4" fill="url(#cross)"/>
  <!-- Horizontal bar -->
  <rect x="12" y="26" width="40" height="12" rx="4" fill="url(#cross)"/>

  <!-- Small dot accent bottom-right -->
  <circle cx="52" cy="52" r="4" fill="rgba(255,255,255,0.35)"/>
</svg>
